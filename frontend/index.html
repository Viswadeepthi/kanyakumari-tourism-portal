<!DOCTYPE html>
<html>
<head>
  <title>Kanyakumari Tourism Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    header {
      background-color: #2e8b57;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background-color: white;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 25px;
      background-color: #2e8b57;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #ddd;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Kanyakumari Tourism Portal</h1>
</header>

<section class="hero">
  <h2>Discover Kanyakumari</h2>
  <p>
    A one-stop verified platform to explore tourist places
    and book local & tribal stays.
  </p>

  <a href="#" class="btn">Explore Places</a>
  <a href="#" class="btn">Book Stays</a>
</section>

<footer>
  <p>Built for Niral Thiruvizha Hackathon</p>
</footer>

</body>
</html>
