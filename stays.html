<!DOCTYPE html>
<html>
<head>
  <title>Accommodation & Stays</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- Pre Booking Modal -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeBooking()">&times;</span>

    <h2>Pre-Book Stay</h2>

    <input type="text" placeholder="Your Name" required>
    <input type="tel" placeholder="Mobile Number" required>
    <input type="date" required>
    <input type="number" placeholder="No. of Nights" required>

    <button onclick="submitBooking()">Submit Request</button>
  </div>
</div>

<script>
  function openBooking() {
    document.getElementById("bookingModal").style.display = "flex";
  }

  function closeBooking() {
    document.getElementById("bookingModal").style.display = "none";
  }

  function submitBooking() {
    alert("Pre-booking request sent successfully!");
    closeBooking();
  }
</script>
<body>

<header>
  <h1>Accommodation & Stays</h1>
</header>

<section class="stays">

  <div class="card stay-card">
    <img src="https://resort-three-oceans.hotelsintamilnadu.com/data/Pics/OriginalPhoto/16948/1694884/1694884070/three-oceans-resort-kanyakumari-pic-23.JPEG">
    <h3>Three Oceans Resort</h3>
    <p>Type: Homestay</p>
    <p>Price: ₹1500 / night</p>
    <button onclick="openBooking()">Pre-Book</button>
  </div>

  <div class="card stay-card">
    <img src="https://cf.bstatic.com/xdata/images/hotel/max1024x768/803530696.jpg?k=97feb742b8e979f92a7ae87ed12dbc44a0f4cb56bdcb97e8188aaf566d4b8b29&o=">
    <h3>Amaari Beach Resort</h3>
    <p>Type: Resort</p>
    <p>Price: ₹3000 / night</p>
    <button>Contact Host</button>
  </div>

  <div class="card stay-card tribal">
    <img src="https://cf.bstatic.com/xdata/images/hotel/max1024x768/398593854.jpg?k=812280ea0d093373a640b1bc91822c305428183724eae94638526ce1fd34ea95&o=">
    <h3>The Coral Kanyakumari🌿</h3>
    <p>Type: Tribal Stay</p>
    <p>Price: ₹1000 / night</p>
    <button>Contact Host</button>
  </div>

</section>

<a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
