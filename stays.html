<!DOCTYPE html>
<html>
<head>
  <title>Accommodation & Stays</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #2e8b57;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .stays {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 260px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .tribal {
      border: 2px solid green;
    }

    .back {
      display: block;
      text-align: center;
      margin-bottom: 30px;
      text-decoration: none;
      color: #2e8b57;
    }
  </style>
</head>

<body>

<header>
  <h1>Accommodation & Stays</h1>
</header>

<section class="stays">

  <div class="card">
    <h3>Green Valley Homestay</h3>
    <p>Type: Homestay</p>
    <p>Price: ₹1500 / night</p>
    <button>Contact Host</button>
  </div>

  <div class="card tribal">
    <h3>Tribal Eco Stay 🌿</h3>
    <p>Type: Tribal Stay</p>
    <p>Price: ₹1000 / night</p>
    <button>Contact Host</button>
  </div>

</section>

<a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
